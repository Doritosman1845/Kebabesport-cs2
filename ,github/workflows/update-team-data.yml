name: Update team data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # hver time

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch team JSON
        run: |
          mkdir -p data
          curl -sS \
            "https://www.ggarena.no/api/paradise/v2/team/209224" \
            -o data/team.json

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/team.json
          git commit -m "chore: update team.json"
          git push
